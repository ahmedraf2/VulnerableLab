<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0c0f1a;
            color: #c9d1d9;
            line-height: 1.6;
            min-height: 100vh;
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* nav */
        nav {
            background: #161b2e;
            border-bottom: 1px solid #21262d;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: #e6edf3;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-brand .dot { width: 8px; height: 8px; background: #f97316; border-radius: 50%; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; font-size: 0.9rem; }
        .nav-links a { color: #8b949e; }
        .nav-links a:hover { color: #e6edf3; text-decoration: none; }
        .nav-user {
            display: flex; align-items: center; gap: 0.75rem;
            color: #e6edf3; font-weight: 500; font-size: 0.9rem;
        }
        .nav-user .balance {
            background: #1c2333;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #3fb950;
            border: 1px solid #21262d;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* cards */
        .card {
            background: #161b2e;
            border: 1px solid #21262d;
            border-radius: 10px;
            padding: 1.25rem;
        }
        .card:hover { border-color: #30363d; }
        .card h3 { color: #e6edf3; font-size: 1rem; margin-bottom: 0.25rem; }
        .card .meta { font-size: 0.8rem; color: #8b949e; }

        /* forms */
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block; font-size: 0.85rem; color: #8b949e;
            margin-bottom: 0.35rem; font-weight: 500;
        }
        input[type="text"], input[type="email"], input[type="password"],
        input[type="number"], textarea, select {
            width: 100%;
            padding: 0.6rem 0.85rem;
            background: #0c0f1a;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 0.9rem;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
        }
        textarea { resize: vertical; min-height: 80px; }

        /* buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.55rem 1.2rem;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .btn-primary { background: #238636; color: #fff; border-color: #2ea043; }
        .btn-primary:hover { background: #2ea043; text-decoration: none; }
        .btn-outline { background: transparent; color: #c9d1d9; border-color: #30363d; }
        .btn-outline:hover { background: #21262d; text-decoration: none; }
        .btn-danger { background: #da3633; color: #fff; border-color: #f85149; }
        .btn-danger:hover { background: #f85149; }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }

        /* grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        /* badges */
        .badge {
            display: inline-block; padding: 0.15rem 0.55rem;
            border-radius: 20px; font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .badge-green { background: #0d3320; color: #3fb950; border: 1px solid #1b4332; }
        .badge-blue { background: #0c2d6b; color: #58a6ff; border: 1px solid #1158c7; }
        .badge-orange { background: #3d2004; color: #f97316; border: 1px solid #6b3a0a; }
        .badge-red { background: #3d0a0a; color: #f85149; border: 1px solid #6b1010; }

        /* table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #8b949e; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.6rem 0.75rem; border-bottom: 1px solid #21262d; }
        td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #161b2e; font-size: 0.9rem; }
        tr:hover td { background: #0c0f1a; }

        .price { color: #3fb950; font-weight: 600; }
        .stars { color: #f59e0b; letter-spacing: 1px; }
        .muted { color: #8b949e; }
        .error-box { background: #3d0a0a; border: 1px solid #6b1010; color: #f85149; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
        .success-box { background: #0d3320; border: 1px solid #1b4332; color: #3fb950; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }

        .section-title { font-size: 1.3rem; font-weight: 700; color: #e6edf3; margin-bottom: 1.25rem; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.5rem; color: #e6edf3; }
        .page-header p { color: #8b949e; margin-top: 0.3rem; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

        footer {
            text-align: center; padding: 2rem; color: #30363d; font-size: 0.8rem;
            margin-top: 3rem; border-top: 1px solid #161b2e;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand"><span class="dot"></span>MarketPlace</a>
        <div class="nav-links">
            <a href="/products">Products</a>
            {% if user %}
                <a href="/dashboard">Dashboard</a>
                <a href="/messages">Messages</a>
                <a href="/transfer">Transfer</a>
                <div class="nav-user">
                    <span class="balance">${{ "%.2f"|format(user.balance) }}</span>
                    <a href="/user/{{ user.id }}">{{ user.username }}</a>
                    <a href="/logout" style="color:#f85149;">logout</a>
                </div>
            {% else %}
                <a href="/login">Log in</a>
                <a href="/register" class="btn btn-primary btn-sm">Sign up</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>vulnerable marketplace &mdash; practice project, not for production use</footer>
</body>
</html>
