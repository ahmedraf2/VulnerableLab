{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div style="max-width:380px;margin:3rem auto;">
    <div class="card" style="padding:2rem;">
        <h2 style="color:#e6edf3;margin-bottom:0.25rem;">Create account</h2>
        <p class="muted" style="margin-bottom:1.5rem;font-size:0.9rem;">Join  marketplace</p>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="pick a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="choose a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create account</button>
        </form>

        <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;" class="muted">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
