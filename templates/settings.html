{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div style="max-width:500px;">
    <div class="page-header">
        <h1>Account Settings</h1>
        <p>Update your profile info.</p>
    </div>

    <div class="card" style="padding:1.5rem;">
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email or '' }}">
            </div>
            <div class="form-group">
                <label>Bio</label>
                <textarea name="bio" rows="3">{{ user.bio or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Avatar URL</label>
                <input type="text" name="avatar_url" value="{{ user.avatar_url or '' }}" placeholder="https://...">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Save changes</button>
        </form>
    </div>

    <div class="card" style="margin-top:1rem;">
        <h3 style="color:#e6edf3;font-size:0.95rem;margin-bottom:0.5rem;">Account info</h3>
        <p class="muted" style="font-size:0.85rem;">Username: {{ user.username }}</p>
        <p class="muted" style="font-size:0.85rem;">Role: <span class="badge badge-blue">{{ user.role }}</span></p>
        <p class="muted" style="font-size:0.85rem;">Balance: ${{ "%.2f"|format(user.balance) }}</p>
    </div>
</div>
{% endblock %}
