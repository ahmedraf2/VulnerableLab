{% extends "base.html" %}
{% block title %}Transfer{% endblock %}
{% block content %}
<div style="max-width:420px;margin:2rem auto;">
    <div class="card" style="padding:1.75rem;">
        <h2 style="color:#e6edf3;margin-bottom:0.25rem;">Transfer Funds</h2>
        <p class="muted" style="margin-bottom:1.25rem;font-size:0.9rem;">Send money to another user on .</p>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="success-box">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Recipient username</label>
                <input type="text" name="recipient" placeholder="who to send to" required>
            </div>
            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Send money</button>
        </form>

        <p class="muted" style="font-size:0.8rem;margin-top:1rem;text-align:center;">
            Your balance: <span class="price">${{ "%.2f"|format(user.balance) }}</span>
        </p>
    </div>
</div>
{% endblock %}
